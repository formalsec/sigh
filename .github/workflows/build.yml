name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    container:
      image: ghcr.io/formalsec/ocaml-5.4
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies and build
        run: |
          opam install -y . --deps-only --with-test
          dune build @install
